services:
  mjlab-dev:
    container_name: mjlab-icrl
    build:
      context: ..                      
      dockerfile: .devcontainer/docker/Dockerfile
    runtime: nvidia
    ipc: host
    tty: true
    stdin_open: true
    command: sleep infinity

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}

    volumes:
      - ..:/workspace:cached           # ← project/ монтируется как /workspace
      - ~/.cache/huggingface:/home/ubuntu/.cache/huggingface:rw
      - ~/.cache/torch:/home/ubuntu/.cache/torch:rw
      - ~/clearml.conf:/home/ubuntu/clearml.conf:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/ubuntu/.Xauthority:ro

    network_mode: host